#
# Based on the following ADR:
# https://github.com/konflux-ci/architecture/blob/main/ADR/0053-trusted-task-model.md
# This supersedes the "acceptable bundles" style of trusting tasks. Instead of matching
# exact digests, the task definition's version is used to determine if it's permitted.
# See also https://redhat.atlassian.net/browse/EC-1536
#
rule_data:
  trusted_task_rules:
    # Note the values of the keys under `deny:` and `allow:` are not signficant.
    # They are needed so trusted task rules from from different sources can be
    # merged together. For that reason they should be unique enough to avoid
    # clashing keys used by trusted tasks from other sources.

    allow:
      konflux-defaults:
        - pattern: oci://quay.io/konflux-ci/tekton-catalog/task-*

        # Conforma's trusted task checks can work with git resolved tasks, but
        # trusting git resolved tasks is problematic for a number of reasons. So
        # this line is intentionally commented out, and Konflux by default does
        # not trust git resolved tasks.
        #- pattern: "git+https://github.com/konflux-ci/build-definitions.git//task/*"

    deny:
      konflux-defaults:
        #-------------------------------------
        # konflux-ci/tekton-catalog
        #-------------------------------------

